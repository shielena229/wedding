<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Спасибо! — Елена &amp; Павел</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Great+Vibes&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: linear-gradient(160deg, #e9eee2 0%, #f6efe4 55%, #f3e7e0 100%);
      color: #4a463f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .card { max-width: 580px; }
    .heart { font-size: 2.4rem; color: #d98b8b; margin-bottom: 18px; }
    h1 {
      font-family: 'Great Vibes', cursive;
      font-weight: 400;
      font-size: clamp(3rem, 13vw, 5rem);
      color: #b23a5b;
      line-height: 1.1;
    }
    p {
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      line-height: 1.6;
      margin-top: 22px;
    }
    .names {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2rem, 9vw, 3rem);
      color: #6f7e62;
      margin-top: 28px;
    }
    a {
      display: inline-block;
      margin-top: 36px;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8a9a7b;
      text-decoration: none;
      border-bottom: 1px solid #c2a878;
      padding-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="heart">&#10084;</div>
    <h1>Спасибо!</h1>
    <p>Ваш ответ получен. Мы очень рады и с нетерпением ждём встречи 21 августа 2026 года!</p>
    <div class="names">Елена &amp; Павел</div>
    <a href="/">Вернуться к приглашению</a>
  </div>
</body>
</html>
